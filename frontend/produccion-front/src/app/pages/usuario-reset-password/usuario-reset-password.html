<div class="container-fluid">

    <div class="row mb-4">
        <div class="col">
            <h2 class="fw-bold">Resetear contraseña</h2>
            <p class="text-muted mb-0">
                Actualización de contraseña por administrador
            </p>
        </div>
    </div>

    <div *ngIf="error" class="alert alert-danger">
        {{ error }}
    </div>

    <div *ngIf="usuario" class="card shadow border-0 mb-4">
        <div class="card-body">
            <h5 class="fw-bold mb-2">Usuario seleccionado</h5>

            <p class="mb-1">
                <strong>CC:</strong> {{ usuario.cc }}
            </p>

            <p class="mb-1">
                <strong>Nombre:</strong>
                {{ usuario.primerNombre }}
                {{ usuario.segundoNombre || '' }}
                {{ usuario.primerApellido }}
                {{ usuario.segundoApellido || '' }}
            </p>

            <p class="mb-0">
                <strong>Rol:</strong>
                <span class="badge text-bg-secondary">
                    {{ usuario.rol }}
                </span>
            </p>
        </div>
    </div>

    <div class="card shadow border-0">
        <div class="card-body">

            <form [formGroup]="form" (ngSubmit)="guardar()" autocomplete="off">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Nueva contraseña</label>
                        <input type="password" class="form-control" formControlName="nuevaPassword"
                            autocomplete="new-password">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Confirmar contraseña</label>
                        <input type="password" class="form-control" formControlName="confirmarPassword"
                            autocomplete="new-password">
                    </div>

                </div>

                <div class="mt-4 d-flex gap-2">
                    <button class="btn btn-warning" type="submit" [disabled]="cargando">
                        {{ cargando ? 'Actualizando...' : 'Actualizar contraseña' }}
                    </button>

                    <a class="btn btn-secondary" routerLink="/usuarios">
                        Cancelar
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>
