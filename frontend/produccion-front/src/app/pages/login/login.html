<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow p-4" style="width: 100%; max-width: 420px;">
        <h3 class="text-center mb-4">Producción Yerman</h3>

        <form (ngSubmit)="iniciarSesion()">
            <div class="mb-3">
                <label class="form-label">Cédula</label>
                <input type="text" class="form-control" name="cc" [(ngModel)]="cc" placeholder="Ingrese su cédula">
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="password" [(ngModel)]="password"
                    placeholder="Ingrese su contraseña">
            </div>

            <div *ngIf="error" class="alert alert-danger py-2">
                {{ error }}
            </div>

            <button class="btn btn-primary w-100" type="submit" [disabled]="cargando">
                {{ cargando ? 'Ingresando...' : 'Ingresar' }}
            </button>
        </form>
    </div>
</div>
