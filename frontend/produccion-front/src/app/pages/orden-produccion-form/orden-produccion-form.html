<div class="container-fluid">

    <div class="row mb-4">
        <div class="col">
            <h2 class="fw-bold">
                Nueva orden de producción
            </h2>

            <p class="text-muted mb-0">
                Planeación de producción y fórmulas
            </p>
        </div>
    </div>

    <form [formGroup]="form">

        <div class="card shadow border-0 mb-4">

            <div class="card-header bg-white fw-bold">
                Información general
            </div>

            <div class="card-body">

                <div class="row g-3">

                    <div class="col-md-3">
                        <label class="form-label">
                            Fecha producción
                        </label>

                        <input type="date" class="form-control" formControlName="fechaProduccion">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">
                            Producto
                        </label>

                        <select class="form-select" formControlName="producto">

                            <option *ngFor="let producto of productos" [value]="producto">

                                {{ producto }}

                            </option>

                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">
                            Responsable
                        </label>

                        <input type="text" class="form-control" formControlName="responsable">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">
                            Turno
                        </label>

                        <select class="form-select" formControlName="turno">

                            <option value="MAÑANA">
                                MAÑANA
                            </option>

                            <option value="TARDE">
                                TARDE
                            </option>

                            <option value="NOCHE">
                                NOCHE
                            </option>

                        </select>
                    </div>

                </div>

            </div>

        </div>

        <div class="card shadow border-0 mb-4">

            <div class="card-header bg-white fw-bold">
                Presentaciones planeadas
            </div>

            <div class="card-body table-responsive">

                <table class="table">

                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Peso g</th>
                            <th>Unidades</th>
                            <th>Kg requeridos</th>
                        </tr>
                    </thead>

                    <tbody formArrayName="presentaciones">

                        <tr *ngFor="let item of presentaciones.controls; let i = index" [formGroupName]="i">

                            <td>
                                <input type="text" class="form-control" formControlName="sku">
                            </td>

                            <td>
                                <input type="number" class="form-control" formControlName="pesoGramos">
                            </td>

                            <td>
                                <input type="number" class="form-control" formControlName="unidadesPlaneadas">
                            </td>

                            <td>
                                <input type="number" class="form-control" formControlName="kilosRequeridos" readonly>
                            </td>

                        </tr>

                    </tbody>

                </table>

                <button type="button" class="btn btn-outline-primary" (click)="agregarPresentacion()">

                    Agregar presentación
                </button>

            </div>

        </div>

        <div class="card shadow border-0 mb-4">

            <div class="card-header bg-white fw-bold">
                Fórmula de producción
            </div>

            <div class="card-body table-responsive">

                <table class="table">

                    <thead>
                        <tr>
                            <th>Ingrediente</th>
                            <th>% Fórmula</th>
                            <th>Cantidad sugerida kg</th>
                            <th>Cantidad ajustada kg</th>
                        </tr>
                    </thead>

                    <tbody formArrayName="ingredientes">

                        <tr *ngFor="let item of ingredientes.controls; let i = index" [formGroupName]="i">

                            <td>
                                <input type="text" class="form-control" formControlName="nombre">
                            </td>

                            <td>
                                <input type="number" class="form-control" formControlName="porcentaje">
                            </td>

                            <td>
                                <input type="number" class="form-control" formControlName="cantidadSugeridaKg" readonly>
                            </td>

                            <td>
                                <input type="number" class="form-control" formControlName="cantidadAjustadaKg">
                            </td>

                        </tr>

                    </tbody>

                </table>

                <button type="button" class="btn btn-outline-primary" (click)="calcular()">

                    Calcular fórmula
                </button>

            </div>

        </div>

    </form>

</div>
