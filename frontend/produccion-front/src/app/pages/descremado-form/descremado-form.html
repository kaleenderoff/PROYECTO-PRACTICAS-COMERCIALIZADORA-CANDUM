<div class="container-fluid">

    <div class="row mb-4">
        <div class="col">
            <h2 class="fw-bold">Registrar descremado</h2>
            <p class="text-muted mb-0">
                Registro de leche descremada, tanque de refrigeración y crema obtenida
            </p>
        </div>
    </div>

    <div *ngIf="cargandoDatos" class="alert alert-info">
        Cargando datos iniciales...
    </div>

    <div *ngIf="error" class="alert alert-danger">
        {{ error }}
    </div>

    <div class="card shadow border-0">
        <div class="card-body">

            <form [formGroup]="form" (ngSubmit)="guardar()">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Recepción de leche</label>

                        <select class="form-select" formControlName="idRecepcionLeche">
                            <option [ngValue]="null">Seleccione una recepción</option>

                            <option *ngFor="let recepcion of recepciones" [value]="recepcion.id">
                                {{ recepcion.fechaRecepcion }} -
                                {{ recepcion.proveedor }} -
                                {{ recepcion.cantidadRecibidaLitros | number:'1.2-2' }} L
                            </option>
                        </select>

                        <small class="text-danger"
                            *ngIf="form.get('idRecepcionLeche')?.invalid && form.get('idRecepcionLeche')?.touched">
                            La recepción es obligatoria.
                        </small>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Tanque destino</label>

                        <input type="text" class="form-control" [value]="
    tanqueRefrigeracion
      ? (tanqueRefrigeracion.nombre + ' - ' +
         (tanqueRefrigeracion.saldoLitros | number:'1.2-2') + ' L disponibles')
      : 'Tanque de refrigeración'
  " readonly>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Litros descremados</label>
                        <input type="number" class="form-control" formControlName="litrosDescremados">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Crema obtenida kg</label>
                        <input type="number" class="form-control" formControlName="cremaObtenidaKg">
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="registraCremaEmpacada"
                                formControlName="registraCremaEmpacada">

                            <label class="form-check-label" for="registraCremaEmpacada">
                                Registrar crema empacada
                            </label>
                        </div>
                    </div>

                </div>

                <div class="row g-3 mt-2" *ngIf="form.get('registraCremaEmpacada')?.value">

                    <div class="col-md-6">
                        <label class="form-label">SKU / presentación crema</label>

                        <select class="form-select" formControlName="idSkuCrema">
                            <option [ngValue]="null">Seleccione SKU de crema</option>

                            <option *ngFor="let sku of skusCrema" [value]="sku.id">
                                {{ sku.codigoSku }} -
                                {{ sku.descripcion }} -
                                {{ sku.pesoNetoGr }} g -
                                {{ sku.tipoEnvase }}
                            </option>
                        </select>

                        <small class="text-danger"
                            *ngIf="form.get('idSkuCrema')?.invalid && form.get('idSkuCrema')?.touched">
                            El SKU de crema es obligatorio.
                        </small>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Unidades crema</label>
                        <input type="number" class="form-control" formControlName="unidadesCrema">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Kg por unidad</label>
                        <input type="number" class="form-control" formControlName="kgPorUnidadCrema">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Lote crema</label>
                        <input type="text" class="form-control" formControlName="loteCrema">
                    </div>

                </div>

                <div class="row g-3 mt-2">

                    <div class="col-md-12">
                        <label class="form-label">Observaciones</label>
                        <textarea class="form-control" rows="3" formControlName="observaciones"></textarea>
                    </div>

                </div>

                <div class="mt-4 d-flex gap-2">
                    <button class="btn btn-primary" type="submit" [disabled]="cargando || cargandoDatos">
                        {{ cargando ? 'Guardando...' : 'Guardar descremado' }}
                    </button>

                    <button class="btn btn-secondary" type="button" routerLink="/descremado">
                        Cancelar
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>
