<header
    class="h-16 sm:h-20 bg-white/90 backdrop-blur-md border-b border-slate-200 px-3 sm:px-4 md:px-6 lg:px-10 flex items-center justify-between shadow-sm">

    <div class="flex items-center gap-3 min-w-0">

        <!-- Botón menú móvil -->
        <button type="button"
            class="lg:hidden w-10 h-10 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 flex items-center justify-center active:scale-95 transition-all"
            (click)="abrirMenu()" aria-label="Abrir menú">
            <i class="bi bi-list text-2xl"></i>
        </button>

        <div class="min-w-0">
            <h2 class="text-sm sm:text-base md:text-lg font-semibold text-slate-800 truncate">
                Sistema de Gestión de Producción
            </h2>
            <p class="text-[10px] sm:text-xs text-slate-500 hidden sm:block truncate">
                Producción Yerman
            </p>
        </div>

        <span
            class="hidden sm:inline-flex px-2.5 py-0.5 bg-blue-50 text-blue-600 text-[10px] font-bold uppercase tracking-wider rounded-full border border-blue-100 shrink-0">
            En Línea
        </span>
    </div>

    <div class="flex items-center gap-2 sm:gap-4">

        <!-- Estado móvil -->
        <span class="sm:hidden w-2.5 h-2.5 bg-emerald-500 rounded-full border border-emerald-100 shrink-0"></span>

        <!-- Notifications -->
        <button type="button"
            class="relative w-10 h-10 flex items-center justify-center text-slate-400 hover:text-slate-600 rounded-xl hover:bg-slate-100 transition-colors">
            <i class="bi bi-bell text-xl"></i>
            <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <!-- Vertical Divider -->
        <div class="hidden sm:block h-6 w-px bg-slate-200"></div>

        <!-- Logout Button -->
        <button type="button" (click)="logout()"
            class="flex items-center justify-center gap-2 w-10 sm:w-auto h-10 sm:h-auto sm:px-4 sm:py-2 bg-slate-50 hover:bg-red-50 text-slate-600 hover:text-red-600 font-medium rounded-xl border border-slate-200 hover:border-red-100 transition-all active:scale-95"
            aria-label="Cerrar sesión">
            <i class="bi bi-box-arrow-right"></i>
            <span class="hidden sm:inline">Cerrar sesión</span>
        </button>
    </div>

</header>
