<header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 md:px-10 flex items-center justify-between shadow-sm">
    
    <div class="flex items-center gap-4">
        <h2 class="text-lg font-semibold text-slate-800 hidden md:block">Sistema de Gestión de Producción</h2>
        <span class="px-2.5 py-0.5 bg-blue-50 text-blue-600 text-[10px] font-bold uppercase tracking-wider rounded-full border border-blue-100">
            En Línea
        </span>
    </div>

    <div class="flex items-center gap-6">
        <!-- Notifications (Mockup) -->
        <button class="relative p-2 text-slate-400 hover:text-slate-600 transition-colors">
            <i class="bi bi-bell text-xl"></i>
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <!-- Vertical Divider -->
        <div class="h-6 w-px bg-slate-200"></div>

        <!-- Logout Button -->
        <button (click)="logout()" 
                class="flex items-center gap-2 px-4 py-2 bg-slate-50 hover:bg-red-50 text-slate-600 hover:text-red-600 font-medium rounded-xl border border-slate-200 hover:border-red-100 transition-all active:scale-95">
            <i class="bi bi-box-arrow-right"></i>
            <span>Cerrar sesión</span>
        </button>
    </div>

</header>
