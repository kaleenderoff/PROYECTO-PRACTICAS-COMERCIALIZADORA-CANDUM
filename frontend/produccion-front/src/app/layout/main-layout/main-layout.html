<div class="h-dvh min-h-dvh bg-slate-50 font-sans flex overflow-hidden">

    <!-- Sidebar responsive -->
    <app-sidebar [mobileOpen]="sidebarMobileAbierto" (closeMobile)="cerrarMenuMovil()">
    </app-sidebar>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0 w-full h-dvh min-h-dvh overflow-hidden">

        <!-- Navbar -->
        <app-navbar class="sticky top-0 z-30 shrink-0" (menuClick)="abrirMenuMovil()">
        </app-navbar>

        <!-- Dynamic Page Content -->
        <main
            class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50 px-3 py-4 sm:px-4 sm:py-5 md:px-6 md:py-6 lg:px-8 lg:py-8">
            <div class="w-full max-w-7xl mx-auto">
                <router-outlet></router-outlet>
            </div>
        </main>

    </div>
</div>
