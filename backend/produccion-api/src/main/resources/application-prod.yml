spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/produccion_yerman?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.yerman: INFO
    org.springframework.security: INFO
    org.flywaydb: INFO
