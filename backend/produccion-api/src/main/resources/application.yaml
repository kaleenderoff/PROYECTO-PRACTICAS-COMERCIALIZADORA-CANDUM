spring:
  application:
    name: produccion-api
  profiles:
    active: dev
  security:
    filter:
      dispatcher-types: request, error, async
  jackson:
    time-zone: America/Bogota
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: America/Bogota
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "baseline esquema actual"

jwt:
  secret: yerman-produccion-secret-key-2024
  expiration: 86400000

server:
  port: 8082
  servlet:
    context-path: /api
  timezone: America/Bogota

logging:
  level:
    com.yerman: DEBUG
    org.springframework.security: TRACE
    org.flywaydb: DEBUG