spring:
  application:
    name: produccion-api
  profiles:
    active: dev
  security:
    filter:
      dispatcher-types: request, error, async
  jackson:
    time-zone: America/Bogota
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: America/Bogota
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "baseline esquema actual"

jwt:
  secret: ${JWT_SECRET:yerman-produccion-secret-key-2024}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api
  timezone: America/Bogota

logging:
  level:
    com.yerman: DEBUG
    org.springframework.security: TRACE
    org.flywaydb: DEBUG
